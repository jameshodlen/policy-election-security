[build]
  command = "pip install -r requirements.txt && mkdocs build"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

[context.deploy-preview]
  command = "pip install -r requirements.txt && mkdocs build"

[context.branch-deploy]
  command = "pip install -r requirements.txt && mkdocs build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
